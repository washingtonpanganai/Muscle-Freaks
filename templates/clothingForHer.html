{% extends "base.html" %}

{% block body_class %}clothingForHer-background{% endblock %}

{% block body %}

<div class ="hero">
    <video autoplay muted loop>
        <source src="{{ url_for('static', filename='videos/Women Edit.mp4') }}" type="video/mp4">
    </video>
</div>

<div class="container">
    <div class="row">

        {% for clothing in clothes %}
  
    <div class="col-md-4 mb-4">
      <div class="card">
        <img class="card-img-top" src="{{ url_for('static', filename='images/' ~ clothing.image) }}">
          <div class="card-body">
            <h5 class="card-title">{{ clothing.clothingName }}</h5>
              <a href="{{ url_for('preorder', id=clothing.id) }}" class="btn btn-dark card1-title">
                <h5 class="card-title">Pre Order</h5>
              </a>
            
          </div>
      </div>
    </div>

    {% endfor %}

{% endblock %}
